name: Build Project

on:
push:
branches: [ "main" ] # Укажите вашу основную ветку (main или master)
pull_request:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest
code Code

steps:
  # 1. Скачиваем код репозитория
  - name: Checkout repository
    uses: actions/checkout@v4

  # 2. Устанавливаем Node.js
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20' # Актуальная LTS версия Node.js
      cache: 'npm'

  # 3. Устанавливаем зависимости
  - name: Install dependencies
    run: npm ci # ci работает быстрее и надежнее, чем install, если есть package-lock.json

  # 4. Запускаем сборку проекта
  - name: Build project
    run: npm run build

  # 5. Сохраняем папку dist И папку cgi-bin как артефакт
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            dist/
            cgi-bin/
